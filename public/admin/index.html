  );
}

// ─── Leads Panel ───
function LeadsPanel() {
  const [leads, setLeads] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadLeads(); }, []);

  const loadLeads = async () => {
    setLoading(true);
    const { data } = await sb.from('raizes_leads').select('*').order('created_at', { ascending: false }).limit(100);
    setLeads(data || []);
    setLoading(false);
  };

  const qualifiedLeads = leads.filter(l => l.qualified);
  const thisMonth = leads.filter(l => {
    const d = new Date(l.created_at);
    const now = new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });

  if (loading) return <div style={{ textAlign: 'center', padding: 80, color: colors.muted, fontSize: 14 }}>Carregando...</div>;

  return (
    <div className="fade-in">
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 28 }}>
        <StatCard label="Total Leads" value={leads.length} icon={Icons.leads} />
        <StatCard label="Este Mês" value={thisMonth.length} icon={Icons.chart} accent={colors.cyan} />
        <StatCard label="Qualificados" value={qualifiedLeads.length} icon={Icons.users} accent={colors.green} />
        <StatCard label="Taxa Qualif." value={leads.length > 0 ? `${Math.round((qualifiedLeads.length / leads.length) * 100)}%` : '—'} icon={Icons.chart} accent={colors.blue} />
      </div>

      <div className="glass-solid" style={{ borderRadius: 20, overflow: 'hidden' }}>
        <table>
          <thead>
            <tr>
              {['Nome', 'Empresa', 'Telefone', 'Email', 'Necessidade', 'Qualificado', 'Data'].map(h => <th key={h}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {leads.length === 0 ? (
              <tr><td colSpan={7} style={{ padding: 40, textAlign: 'center', color: colors.muted }}>Nenhum lead capturado</td></tr>
            ) : leads.map(l => (
              <tr key={l.id}>
                <td style={{ fontWeight: 600 }}>{l.name || '—'}</td>
                <td style={{ color: colors.muted }}>{l.company || '—'}</td>
                <td style={{ color: colors.muted }}>{l.phone || '—'}</td>
                <td style={{ color: colors.muted }}>{l.email || '—'}</td>
                <td style={{ maxWidth: 220, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: colors.muted }}>{l.need || l.summary || '—'}</td>
                <td>
                  <span className="badge" style={{ background: l.qualified ? '#dcfce7' : '#f1f5f9', color: l.qualified ? '#166534' : '#475569' }}>
                    {l.qualified ? 'Sim' : 'Não'}
                  </span>
                </td>
                <td style={{ color: colors.muted, fontSize: 12 }}>{formatDate(l.created_at)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Main Dashboard ───
function Dashboard({ session }) {
  const [orgs, setOrgs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [selectedOrg, setSelectedOrg] = useState(null);
  const [form, setForm] = useState({ orgName: '', adminName: '', adminUsername: '', adminPassword: '', planSlug: 'starter', trialDays: 14, primaryColor: '#2D5A3D', secondaryColor: '', faviconUrl: '', logoUrl: '', vertical: '', features: {}, labels: {} });
  const [presetKey, setPresetKey] = useState('crm');
  const [showMods, setShowMods] = useState(false);
  const [dbTemplates, setDbTemplates] = useState([]);
  const [step, setStep] = useState(1);          // wizard: passo atual (1..4)
  const [showPwd, setShowPwd] = useState(false); // mostrar/ocultar senha do admin
  const [touched, setTouched] = useState({});    // avisos touched-aware (advisory)
  const [createError, setCreateError] = useState(null); // erro do provision-org (só no passo 4; separado do toast global)
  const [creating, setCreating] = useState(false);
  const [msg, setMsg] = useState(null);
  const [search, setSearch] = useState('');
  const [activeTab, setActiveTab] = useState('overview');
  const [sortField, setSortField] = useState('name');
  const [sortDir, setSortDir] = useState('asc');

  const loadOrgs = async () => {
    setLoading(true);
    const data = await callFn('admin-list-orgs');
    if (data.orgs) setOrgs(data.orgs);
    setLoading(false);
  };

  useEffect(() => { loadOrgs(); loadTemplates(); }, []);

  // Templates salvos (org_templates via edge admin-org-templates). Falha silenciosa →
  // lista vazia → só os presets embutidos aparecem (fallback à prova de falha).
  const loadTemplates = async () => {
    try { const data = await callFn('admin-org-templates', { action: 'list' }); if (data && data.templates) setDbTemplates(data.templates); }
    catch (_) { /* mantém só os embutidos */ }
  };

  // Preset → aplica vertical + features (sempre) e labels/branding (só se o template
  // define — os embutidos não têm, então não mexem nesses). Fine-tune manual limpa o highlight.
  const applyPreset = (p) => {
    setPresetKey(p.key || p.id);
    setForm(f => {
      const next = { ...f, vertical: p.vertical || '', features: { ...(p.features || {}) } };
      if (p.labels && typeof p.labels === 'object') next.labels = { ...p.labels };
      const b = p.branding;
      if (b && typeof b === 'object') {
        if (b.primaryColor) next.primaryColor = b.primaryColor;
        if (b.secondaryColor) next.secondaryColor = b.secondaryColor;
        if (typeof b.logoUrl === 'string') next.logoUrl = b.logoUrl;
        if (typeof b.faviconUrl === 'string') next.faviconUrl = b.faviconUrl;
      }
      return next;
    });
  };
  const saveAsTemplate = async () => {
    const name = window.prompt('Nome do template (ex.: "Escola", "Imobiliária"):');
    if (!name || !name.trim()) return;
    const cleanLabels = {};
    for (const [k, v] of Object.entries(form.labels || {})) if (typeof v === 'string' && v.trim()) cleanLabels[k] = v.trim();
    const template = {
      name: name.trim(),
      vertical: form.vertical,
      features: form.features,
      labels: cleanLabels,
      branding: { primaryColor: form.primaryColor, secondaryColor: form.secondaryColor, logoUrl: form.logoUrl, faviconUrl: form.faviconUrl },
    };
    const data = await callFn('admin-org-templates', { action: 'create', template });
    if (data && data.ok) { setMsg({ type: 'success', text: `Template "${name.trim()}" salvo!` }); loadTemplates(); }
    else setMsg({ type: 'error', text: (data && data.error) || 'Erro ao salvar template' });
  };
  const deleteTemplate = async (id, name) => {
    if (!window.confirm(`Excluir o template "${name}"?`)) return;
    const data = await callFn('admin-org-templates', { action: 'delete', id });
    if (data && data.ok) { if (presetKey === id) setPresetKey(null); loadTemplates(); }
    else setMsg({ type: 'error', text: (data && data.error) || 'Erro ao excluir template' });
  };
  const toggleCreateModule = (key, value) => { setPresetKey(null); setForm(f => ({ ...f, features: { ...f.features, [key]: value } })); };
  const setLabelField = (key, value) => setForm(f => ({ ...f, labels: { ...f.labels, [key]: value } }));
  const resetForm = () => { setForm({ orgName: '', adminName: '', adminUsername: '', adminPassword: '', planSlug: 'starter', trialDays: 14, primaryColor: '#2D5A3D', secondaryColor: '', faviconUrl: '', logoUrl: '', vertical: '', features: {}, labels: {} }); setPresetKey('crm'); setShowMods(false); setStep(1); setTouched({}); setShowPwd(false); setCreateError(null); };

  // Wizard — validação por passo. WIZARD_STRICT (self-service futuro) OFF hoje → trava
  // IDÊNTICA à de hoje: só o passo 1 (os 4 obrigatórios) pode travar; passos 2-4 sempre ok.
  const WIZARD_STRICT = false;
  const step1Minimal = !!(form.orgName.trim() && form.adminName.trim() && form.adminUsername.trim() && form.adminPassword.trim());
  const step1Strict = form.orgName.trim().length >= 2 && form.adminName.trim().length >= 2 && /^[a-z0-9_]{3,30}$/.test(form.adminUsername) && form.adminPassword.length >= 8;
  const step1Valid = WIZARD_STRICT ? step1Strict : step1Minimal;
  const canAdvance = (step === 1 ? step1Valid : true);
  const markTouched = (k) => setTouched(t => ({ ...t, [k]: true }));
  const goNext = () => { if (!canAdvance) { setTouched({ orgName: true, adminName: true, adminUsername: true, adminPassword: true }); return; } setStep(s => Math.min(4, s + 1)); };
  const goBack = () => setStep(s => Math.max(1, s - 1));
  const goToStep = (s) => { if (s < step || step1Valid) setStep(s); };

  const handleCreate = async () => {
    if (!form.orgName || !form.adminName || !form.adminUsername || !form.adminPassword) { setCreateError('Preencha os campos obrigatórios (passo 1).'); setStep(1); return; }
    setCreating(true);
    setCreateError(null);
    // Envia vertical/features/labels só quando há algo — sem eles a org nasce como hoje
    // (o edge só grava settings.* se vierem). Payload mínimo = intenção clara.
    const { vertical, features, labels, ...rest } = form;
    const payload = { ...rest };
    if (features && Object.keys(features).length > 0) payload.features = features;
    if (vertical) payload.vertical = vertical;
    const cleanLabels = {};
    for (const [k, v] of Object.entries(labels || {})) if (typeof v === 'string' && v.trim()) cleanLabels[k] = v.trim();
    if (Object.keys(cleanLabels).length > 0) payload.labels = cleanLabels;
    const data = await callFn('provision-org', payload);
    if (data.ok) {
      setMsg({ type: 'success', text: `"${data.org.name}" criada com sucesso!` });
      setShowModal(false);
      resetForm();
      loadOrgs();
    } else {
      setCreateError(data.error || 'Não foi possível criar a organização.');
    }
    setCreating(false);
  };

  const toggleOrg = async (orgId, active) => {
    await callFn('deactivate-org', { orgId, action: active ? 'deactivate' : 'activate' });
    loadOrgs();
  };

  const handleSort = (field) => {
    if (sortField === field) {
      setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    } else {
      setSortField(field);
      setSortDir('asc');
    }
  };

  const sortArrow = (field) => {
    if (sortField !== field) return '';
    return sortDir === 'asc' ? ' ↑' : ' ↓';
  };

  const filtered = orgs
    .filter(o => o.name.toLowerCase().includes(search.toLowerCase()) || o.slug.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      let aVal, bVal;
      switch (sortField) {
        case 'name':
          aVal = (a.name || '').toLowerCase();
          bVal = (b.name || '').toLowerCase();
          break;
        case 'plan':
          aVal = (a.subscription?.plan?.name || '').toLowerCase();
          bVal = (b.subscription?.plan?.name || '').toLowerCase();
          break;
        case 'status':
          aVal = (a.subscription?.status || '').toLowerCase();
          bVal = (b.subscription?.status || '').toLowerCase();
          break;
        case 'health':
          aVal = a.healthScore || 0;
          bVal = b.healthScore || 0;
          break;
        case 'deals30d':
          aVal = a.deals30d || a.metrics?.deals || 0;
          bVal = b.deals30d || b.metrics?.deals || 0;
          break;
        case 'lastActivity':
          aVal = a.lastActivity ? new Date(a.lastActivity).getTime() : 0;
          bVal = b.lastActivity ? new Date(b.lastActivity).getTime() : 0;
          break;
        case 'users':
          aVal = a.metrics?.users || 0;
          bVal = b.metrics?.users || 0;
          break;
        default:
          aVal = (a.name || '').toLowerCase();
          bVal = (b.name || '').toLowerCase();
      }
      if (aVal < bVal) return sortDir === 'asc' ? -1 : 1;
      if (aVal > bVal) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });

  const activeOrgs = orgs.filter(o => o.isActive).length;
  const totalUsers = orgs.reduce((s, o) => s + (o.metrics?.users || 0), 0);
  const mrr = orgs.reduce((s, o) => s + (o.subscription?.plan?.price_monthly || 0), 0);
  const totalDeals = orgs.reduce((s, o) => s + (o.metrics?.deals || 0), 0);

  const navItems = [
    { key: 'overview', label: 'Visão Geral', icon: Icons.overview },
    { key: 'orgs', label: 'Organizações', icon: Icons.building },
    { key: 'leads', label: 'Leads', icon: Icons.leads },
    { key: 'suporte', label: 'Suporte & NPS', icon: Icons.ticket },
  ];

  return (
    <div style={{ minHeight: '100vh', background: colors.creme, display: 'flex' }}>
      {/* Sidebar */}
      <div style={{ width: 240, background: '#fff', borderRight: '1px solid rgba(60,61,55,0.06)', display: 'flex', flexDirection: 'column', position: 'fixed', top: 0, bottom: 0, left: 0, zIndex: 50 }}>
        <div style={{ padding: '24px 20px 20px' }}>
          <div className="serif" style={{ fontSize: 24, fontWeight: 700, color: colors.earth }}>raízes<span style={{ color: colors.blue }}>.</span></div>
          <div style={{ fontSize: 11, color: colors.muted, marginTop: 2, fontWeight: 500 }}>Gerenciamento SaaS</div>
        </div>

        <nav style={{ flex: 1, padding: '8px 12px', display: 'flex', flexDirection: 'column', gap: 2 }}>
          {navItems.map(item => (
            <a key={item.key} className={`nav-item ${activeTab === item.key ? 'active' : ''}`} onClick={() => setActiveTab(item.key)}>
              {item.icon}
              {item.label}
            </a>
          ))}
        </nav>

        <div style={{ padding: '16px 12px', borderTop: '1px solid rgba(60,61,55,0.06)' }}>
          <div style={{ padding: '8px 16px', marginBottom: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: colors.earth }}>{session.profile?.name}</div>
            <div style={{ fontSize: 11, color: colors.muted }}>Super Admin</div>
          </div>
          <a className="nav-item" onClick={() => sb.auth.signOut().then(() => location.reload())} style={{ color: colors.danger + '99' }}>
            {Icons.logout}
            Sair
          </a>
        </div>
      </div>

      {/* Main content */}
      <div style={{ marginLeft: 240, flex: 1, minHeight: '100vh' }}>
        {/* Page header */}
        <div style={{ padding: '24px 32px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h1 className="serif" style={{ fontSize: 28, fontWeight: 700, color: colors.earth }}>
            {navItems.find(n => n.key === activeTab)?.label}
          </h1>
          {activeTab === 'orgs' && (
            <button onClick={() => { setStep(1); setTouched({}); setShowModal(true); }} className="btn-gradient" style={{ padding: '10px 24px', borderRadius: 14, fontSize: 14, display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ width: 16, height: 16, display: 'flex' }}>{Icons.plus}</span>
              Nova Organização
            </button>
          )}
        </div>

        <div style={{ padding: '20px 32px 32px' }}>
          <Toast msg={msg} onClear={() => setMsg(null)} />

          {activeTab === 'overview' && <OverviewPanel />}
          {activeTab === 'suporte' && <SupportPanel />}
          {activeTab === 'leads' && <LeadsPanel />}
          {activeTab === 'orgs' && (
            <div className="fade-in">
              {/* Stats */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 28 }}>
                <StatCard label="Organizações" value={`${activeOrgs}/${orgs.length}`} icon={Icons.building} />
                <StatCard label="Usuários" value={totalUsers} icon={Icons.users} accent={colors.cyan} />
                <StatCard label="MRR Estimado" value={`R$ ${mrr.toLocaleString('pt-BR')}`} icon={Icons.chart} accent={colors.green} />
                <StatCard label="Deals" value={totalDeals} icon={Icons.chat} accent={colors.warning} />
              </div>

              {/* Chart */}
              <div style={{ marginBottom: 28 }}>
                <GrowthChart orgs={orgs} />
              </div>

              {/* Search */}
              <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
                <div style={{ flex: 1, position: 'relative' }}>
                  <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', width: 16, height: 16, color: colors.muted, display: 'flex' }}>{Icons.search}</span>
                  <input className="input" type="text" placeholder="Buscar organização..." value={search} onChange={e => setSearch(e.target.value)} style={{ paddingLeft: 40 }} />
                </div>
                <button onClick={loadOrgs} style={{ width: 42, height: 42, border: '1px solid rgba(60,61,55,0.1)', borderRadius: 12, background: '#fff', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: colors.muted, padding: 10, transition: 'all 0.2s' }} title="Atualizar">
                  {Icons.refresh}
                </button>
              </div>

              {/* Table */}
              <div className="glass-solid" style={{ borderRadius: 20, overflow: 'hidden' }}>
                <table>
                  <thead>
                    <tr>
                      <th>Organização</th>
                      <th className="sortable" onClick={() => handleSort('plan')}>Plano{sortArrow('plan')}</th>
                      <th className="sortable" onClick={() => handleSort('status')}>Status{sortArrow('status')}</th>
                      <th className="sortable" onClick={() => handleSort('health')} style={{ textAlign: 'center' }} title={HEALTH_TOOLTIP}>Saúde{sortArrow('health')}</th>
                      <th className="sortable" onClick={() => handleSort('deals30d')} style={{ textAlign: 'center' }}>Deals 30d{sortArrow('deals30d')}</th>
                      <th className="sortable" onClick={() => handleSort('lastActivity')}>Últ. Atividade{sortArrow('lastActivity')}</th>
                      <th className="sortable" onClick={() => handleSort('users')} style={{ textAlign: 'center' }}>Usuários{sortArrow('users')}</th>
                      <th style={{ textAlign: 'right' }}>Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                    {loading ? (
                      <tr><td colSpan={8} style={{ padding: 48, textAlign: 'center', color: colors.muted }}>Carregando...</td></tr>
                    ) : filtered.length === 0 ? (
                      <tr><td colSpan={8} style={{ padding: 48, textAlign: 'center', color: colors.muted }}>Nenhuma organização encontrada</td></tr>

                      <tr key={org.id} onClick={() => setSelectedOrg(org)} style={{ cursor: 'pointer', opacity: org.isActive ? 1 : 0.45 }}>

                          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>

                              {org.logoUrl ? <img src={org.logoUrl} style={{ width: 36, height: 36, objectFit: 'cover' }} /> : org.name.charAt(0)}
                            </div>
                            <div>
                              <div style={{ fontWeight: 700, color: colors.earth }}>{org.name}</div>
                              <div style={{ fontSize: 11, color: colors.muted }}>{org.slug}.raizesolucoes.com.br</div>
                            </div>
                          </div>
                        </td>
                        <td style={{ fontWeight: 600 }}>{org.subscription?.plan?.name || '—'}</td>
                        <td><Badge status={org.subscription?.status} /></td>
                        <td style={{ textAlign: 'center' }}><HealthBadge score={org.healthScore} /></td>
                        <td style={{ textAlign: 'center', fontWeight: 600 }}>{org.deals30d !== undefined ? org.deals30d : (org.metrics?.deals || 0)}</td>
                        <td style={{ fontSize: 12, color: colors.muted }}>{timeAgo(org.lastActivity)}</td>
                        <td style={{ textAlign: 'center', fontWeight: 600 }}>{org.metrics?.users || 0}</td>
                        <td style={{ textAlign: 'right' }}>
                          <button onClick={(e) => { e.stopPropagation(); toggleOrg(org.id, org.isActive); }} style={{ padding: '6px 14px', border: '1px solid rgba(60,61,55,0.1)', borderRadius: 8, background: 'transparent', fontSize: 12, fontWeight: 700, cursor: 'pointer', color: org.isActive ? colors.danger : colors.green, transition: 'all 0.2s' }}>
                            {org.isActive ? 'Desativar' : 'Ativar'}
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Detail Panel */}
      {selectedOrg && <OrgDetail org={selectedOrg} onClose={() => setSelectedOrg(null)} onUpdate={loadOrgs} onRefreshOrgs={() => { setSelectedOrg(null); loadOrgs(); }} />}

      {/* Create Org Modal */}
      {showModal && (
        <Modal title="Nova Organização" subtitle={`Passo ${step} de 4`} onClose={() => setShowModal(false)} width={600}>
          {/* Stepper */}
          <div style={{ padding: '16px 28px 2px', display: 'flex', alignItems: 'center', gap: 4 }}>
            {['Empresa', 'Produto', 'Marca', 'Revisão'].map((lbl, i) => {
              const n = i + 1;
              const done = n < step, cur = n === step, clickable = n < step || step1Valid;
              return (
                <React.Fragment key={n}>
                  {i > 0 && <div style={{ flex: 1, height: 2, background: n <= step ? colors.blue : 'rgba(60,61,55,0.12)' }} />}
                  <button type="button" onClick={() => goToStep(n)} disabled={!clickable} style={{ display: 'flex', alignItems: 'center', gap: 6, border: 'none', background: 'transparent', cursor: clickable ? 'pointer' : 'default', padding: 2 }}>
                    <span style={{ width: 22, height: 22, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0, background: cur ? colors.blue : done ? 'rgba(57,77,250,0.12)' : 'rgba(60,61,55,0.08)', color: cur ? '#fff' : done ? colors.blue : colors.muted }}>{done ? '✓' : n}</span>
                    <span style={{ fontSize: 12, fontWeight: 600, color: cur ? colors.earth : colors.muted, whiteSpace: 'nowrap' }}>{lbl}</span>
                  </button>
                </React.Fragment>
              );
            })}
          </div>

          <div style={{ padding: '12px 28px 20px', display: 'flex', flexDirection: 'column', gap: 14 }}>
            {/* ===== PASSO 1 — Empresa e acesso ===== */}
            {step === 1 && (
              <div onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); goNext(); } }} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 6 }}>Empresa</label>
                  <input className="input" type="text" autoFocus value={form.orgName} onChange={e => setForm({...form, orgName: e.target.value})} onBlur={() => markTouched('orgName')} placeholder="Nome da empresa" />
                  {touched.orgName && !form.orgName.trim() && <div style={{ fontSize: 11, color: colors.warning || '#b45309', marginTop: 4 }}>Informe o nome da empresa.</div>}
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 6 }}>Administrador</label>
                  <input className="input" type="text" value={form.adminName} onChange={e => setForm({...form, adminName: e.target.value})} onBlur={() => markTouched('adminName')} placeholder="Nome do admin" />
                  {touched.adminName && !form.adminName.trim() && <div style={{ fontSize: 11, color: colors.warning || '#b45309', marginTop: 4 }}>Informe o nome do administrador.</div>}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 6 }}>Username</label>
                    <input className="input" type="text" value={form.adminUsername} onChange={e => setForm({...form, adminUsername: e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '')})} onBlur={() => markTouched('adminUsername')} placeholder="username" />
                    <div style={{ fontSize: 11, color: colors.muted, marginTop: 4 }}>Login do admin. Só a-z, 0-9 e _.</div>
                    {touched.adminUsername && !form.adminUsername.trim() && <div style={{ fontSize: 11, color: colors.warning || '#b45309', marginTop: 2 }}>Informe um username.</div>}
                  </div>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 6 }}>Senha</label>
                    <div style={{ position: 'relative' }}>
                      <input className="input" type={showPwd ? 'text' : 'password'} value={form.adminPassword} onChange={e => setForm({...form, adminPassword: e.target.value})} onBlur={() => markTouched('adminPassword')} placeholder="Senha" style={{ paddingRight: 64 }} />
                      <button type="button" onClick={() => setShowPwd(s => !s)} style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 11, fontWeight: 600, color: colors.blue }}>{showPwd ? 'Ocultar' : 'Mostrar'}</button>
                    </div>
                    {touched.adminPassword && !form.adminPassword && <div style={{ fontSize: 11, color: colors.warning || '#b45309', marginTop: 2 }}>Defina uma senha.</div>}
                  </div>
                </div>
              </div>
            )}

            {/* ===== PASSO 2 — Produto e plano ===== */}
            {step === 2 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 8 }}>Produto</label>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                    {CREATE_PRESETS.map(p => (
                      <button key={p.key} type="button" onClick={() => applyPreset(p)} style={{ padding: '10px 12px', border: presetKey === p.key ? `2px solid ${colors.blue}` : '1px solid rgba(60,61,55,0.1)', borderRadius: 12, background: presetKey === p.key ? 'rgba(57,77,250,0.04)' : '#fff', cursor: 'pointer', textAlign: 'left', transition: 'all 0.15s' }}>
                        <div style={{ fontWeight: 700, fontSize: 13, color: presetKey === p.key ? colors.blue : colors.earth }}>{p.label}</div>
                        <div style={{ fontSize: 11, color: colors.muted, marginTop: 2, lineHeight: 1.3 }}>{p.desc}</div>
                      </button>
                    ))}
                    {dbTemplates.map(t => (
                      <div key={t.id} style={{ position: 'relative' }}>
                        <button type="button" onClick={() => applyPreset(t)} style={{ width: '100%', padding: '10px 12px', paddingRight: 26, border: presetKey === t.id ? `2px solid ${colors.blue}` : '1px solid rgba(60,61,55,0.1)', borderRadius: 12, background: presetKey === t.id ? 'rgba(57,77,250,0.04)' : '#fff', cursor: 'pointer', textAlign: 'left', transition: 'all 0.15s' }}>
                          <div style={{ fontWeight: 700, fontSize: 13, color: presetKey === t.id ? colors.blue : colors.earth }}>{t.name}</div>
                          <div style={{ fontSize: 11, color: colors.muted, marginTop: 2, lineHeight: 1.3 }}>{t.description || 'Template salvo'}</div>
                        </button>
                        <button type="button" title="Excluir template" onClick={() => deleteTemplate(t.id, t.name)} style={{ position: 'absolute', top: 6, right: 6, border: 'none', background: 'transparent', cursor: 'pointer', color: colors.muted, fontSize: 16, lineHeight: 1, padding: 2 }}>×</button>
                      </div>
                    ))}
                  </div>
                  <button type="button" onClick={saveAsTemplate} style={{ marginTop: 8, width: '100%', background: 'transparent', border: '1px dashed rgba(60,61,55,0.25)', borderRadius: 10, padding: '8px 12px', cursor: 'pointer', fontSize: 12, fontWeight: 600, color: colors.blue }}>
                    ＋ Salvar configuração atual como template
                  </button>
                </div>

                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 6 }}>Vertical</label>
                  <select className="input" value={form.vertical} onChange={e => { setPresetKey(null); setForm({ ...form, vertical: e.target.value }); }}>
                    {VERTICALS.map(v => <option key={v.value} value={v.value}>{v.label}</option>)}
                  </select>
                  <div style={{ fontSize: 11, color: colors.muted, marginTop: 4 }}>{VERTICALS.find(v => v.value === form.vertical)?.description}</div>
                </div>

                <div>
                  <button type="button" onClick={() => setShowMods(s => !s)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 700, color: colors.blue, padding: 0 }}>
                    {showMods ? '▾ Ocultar módulos' : '▸ Ajustar módulos'}
                  </button>
                  {showMods && (
                    <div style={{ marginTop: 10, border: '1px solid rgba(60,61,55,0.08)', borderRadius: 12, padding: 12, background: 'rgba(60,61,55,0.015)' }}>
                      <CreateModulesGrid features={form.features} vertical={form.vertical} onToggle={toggleCreateModule} />
                    </div>
                  )}
                </div>

                <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                  <div style={{ flex: 1, minWidth: 260 }}>
                    <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 8 }}>Plano</label>
                    <div style={{ display: 'flex', gap: 10 }}>
                      {['starter', 'pro', 'enterprise'].map(p => (
                        <button key={p} onClick={() => setForm({...form, planSlug: p})} style={{ flex: 1, padding: 12, border: form.planSlug === p ? `2px solid ${colors.blue}` : '1px solid rgba(60,61,55,0.1)', borderRadius: 14, background: form.planSlug === p ? 'rgba(57,77,250,0.04)' : '#fff', cursor: 'pointer', textAlign: 'center', transition: 'all 0.2s' }}>
                          <div style={{ fontWeight: 700, fontSize: 14, textTransform: 'capitalize', color: form.planSlug === p ? colors.blue : colors.earth }}>{p}</div>
                          <div style={{ fontSize: 11, color: colors.muted, marginTop: 2 }}>R$ {planPrices[p]}/mês</div>
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 8 }}>Trial (dias)</label>
                    <input className="input" type="number" value={form.trialDays} onChange={e => setForm({...form, trialDays: parseInt(e.target.value) || 0})} min={0} max={90} style={{ width: 100 }} />
                  </div>
                </div>
              </div>
            )}

            {/* ===== PASSO 3 — Marca e rótulos (opcional) ===== */}
            {step === 3 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <div style={{ fontSize: 11, color: colors.muted }}>Opcional — em branco, a org usa o padrão Raízes/Miller.</div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 8 }}>Marca</label>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
                    <div>
                      <span style={{ fontSize: 11, color: colors.muted, display: 'block', marginBottom: 4 }}>Logo (URL)</span>
                      <input className="input" type="url" value={form.logoUrl} onChange={e => setForm({...form, logoUrl: e.target.value})} placeholder="https://…/logo.svg" />
                    </div>
                    <div>
                      <span style={{ fontSize: 11, color: colors.muted, display: 'block', marginBottom: 4 }}>Favicon (URL)</span>
                      <input className="input" type="url" value={form.faviconUrl} onChange={e => setForm({...form, faviconUrl: e.target.value})} placeholder="https://…/favicon.png" />
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 14, alignItems: 'flex-end' }}>
                    <div>
                      <span style={{ fontSize: 11, color: colors.muted, display: 'block', marginBottom: 4 }}>Cor primária</span>
                      <input type="color" value={form.primaryColor} onChange={e => setForm({...form, primaryColor: e.target.value})} style={{ width: 44, height: 44, border: '1px solid rgba(60,61,55,0.1)', borderRadius: 10, cursor: 'pointer', padding: 2 }} />
                    </div>
                    <div>
                      <span style={{ fontSize: 11, color: colors.muted, display: 'block', marginBottom: 4 }}>Cor secundária</span>
                      <input type="color" value={form.secondaryColor || '#3c3d37'} onChange={e => setForm({...form, secondaryColor: e.target.value})} style={{ width: 44, height: 44, border: '1px solid rgba(60,61,55,0.1)', borderRadius: 10, cursor: 'pointer', padding: 2 }} />
                    </div>
                    {form.logoUrl ? <img key={form.logoUrl} src={form.logoUrl} alt="logo" style={{ height: 44, maxWidth: 120, objectFit: 'contain', borderRadius: 8, border: '1px solid rgba(60,61,55,0.08)' }} onError={e => { e.target.style.display = 'none'; }} /> : null}
                  </div>
                </div>

                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: colors.muted, display: 'block', marginBottom: 8 }}>Rótulos (nomenclatura)</label>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px 12px' }}>
                    {LABEL_CATALOG.map(l => (
                      <div key={l.key} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <span style={{ fontSize: 11, color: colors.muted, width: 66, flexShrink: 0, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }} title={l.label}>{l.label}</span>
                        <input className="input" type="text" value={form.labels[l.key] || ''} onChange={e => setLabelField(l.key, e.target.value)} placeholder={l.label} style={{ padding: '7px 10px', fontSize: 12 }} />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ===== PASSO 4 — Revisão ===== */}
            {step === 4 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <div style={{ border: '1px solid rgba(60,61,55,0.1)', borderRadius: 12, padding: 14 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: colors.earth }}>Empresa & acesso</span>
                    <button type="button" onClick={() => setStep(1)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 11, fontWeight: 700, color: colors.blue }}>Editar</button>
                  </div>
                  <div style={{ fontSize: 13, color: colors.earth, display: 'grid', gridTemplateColumns: 'auto 1fr', gap: '2px 10px' }}>
                    <span style={{ color: colors.muted }}>Empresa</span><span style={{ fontWeight: 600 }}>{form.orgName || '—'}</span>
                    <span style={{ color: colors.muted }}>Admin</span><span style={{ fontWeight: 600 }}>{form.adminName || '—'}{form.adminUsername ? ` (@${form.adminUsername})` : ''}</span>
                    <span style={{ color: colors.muted }}>Senha</span><span style={{ fontWeight: 600 }}>{form.adminPassword ? (showPwd ? form.adminPassword : '••••••••') : '—'} <button type="button" onClick={() => setShowPwd(s => !s)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 11, color: colors.blue }}>{showPwd ? 'ocultar' : 'revelar'}</button></span>
                  </div>
                </div>

                <div style={{ border: '1px solid rgba(60,61,55,0.1)', borderRadius: 12, padding: 14 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: colors.earth }}>Produto & plano</span>
                    <button type="button" onClick={() => setStep(2)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 11, fontWeight: 700, color: colors.blue }}>Editar</button>
                  </div>
                  <div style={{ fontSize: 13, color: colors.earth, display: 'grid', gridTemplateColumns: 'auto 1fr', gap: '2px 10px' }}>
                    <span style={{ color: colors.muted }}>Produto</span><span style={{ fontWeight: 600 }}>{presetKey ? (CREATE_PRESETS.find(p => p.key === presetKey)?.label || dbTemplates.find(t => t.id === presetKey)?.name || 'Configuração custom') : 'Configuração custom'}</span>
                    <span style={{ color: colors.muted }}>Vertical</span><span style={{ fontWeight: 600 }}>{VERTICALS.find(v => v.value === form.vertical)?.label || 'Nenhuma'}</span>
                    <span style={{ color: colors.muted }}>Módulos</span><span style={{ fontWeight: 600 }}>{(() => { const forced = form.vertical === 'atendimento' ? ATENDIMENTO_FORCED : null; let n = 0; MODULE_CATALOG.forEach(c => c.items.forEach(m => { const on = (forced && m.key in forced) ? forced[m.key] : (form.features[m.key] !== undefined ? form.features[m.key] : m.default); if (on) n++; })); return n; })()} ativos</span>
                    <span style={{ color: colors.muted }}>Plano</span><span style={{ fontWeight: 600 }}>{form.planSlug} · R$ {planPrices[form.planSlug]}/mês · {form.trialDays} dias trial</span>
                  </div>
                </div>

                <div style={{ border: '1px solid rgba(60,61,55,0.1)', borderRadius: 12, padding: 14 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: colors.earth }}>Marca & rótulos</span>
                    <button type="button" onClick={() => setStep(3)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 11, fontWeight: 700, color: colors.blue }}>Editar</button>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 13, color: colors.earth, flexWrap: 'wrap' }}>
                    <span style={{ width: 20, height: 20, borderRadius: 6, background: form.primaryColor, border: '1px solid rgba(0,0,0,0.1)' }} />
                    <span style={{ width: 20, height: 20, borderRadius: 6, background: form.secondaryColor || '#3c3d37', border: '1px solid rgba(0,0,0,0.1)' }} />
                    <span style={{ color: colors.muted }}>Logo: <b style={{ color: colors.earth }}>{form.logoUrl ? 'definido' : '—'}</b></span>
                    <span style={{ color: colors.muted }}>Rótulos: <b style={{ color: colors.earth }}>{Object.values(form.labels || {}).filter(v => v && v.trim()).length || 'padrão'}</b></span>
                  </div>
                </div>

                <div style={{ fontSize: 11, color: colors.muted, lineHeight: 1.4 }}>Campos em branco = a organização nasce no padrão Miller (features/vertical/labels são omitidos do envio; a marca vazia segue como hoje).</div>
                {createError && <div style={{ fontSize: 12, color: '#b91c1c', background: 'rgba(220,38,38,0.06)', border: '1px solid rgba(220,38,38,0.2)', borderRadius: 10, padding: '8px 12px' }}>{createError}</div>}
              </div>
            )}
          </div>

          {/* Footer nav */}
          <div style={{ padding: '16px 28px', borderTop: '1px solid rgba(60,61,55,0.06)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setShowModal(false)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 13, fontWeight: 600, color: colors.muted }}>Cancelar</button>
              {step > 1 && <button onClick={goBack} className="input" style={{ width: 'auto', cursor: 'pointer', fontWeight: 600, textAlign: 'center' }}>← Voltar</button>}
            </div>
            {step < 4 ? (
              <button onClick={goNext} disabled={!canAdvance} className="btn-gradient" style={{ padding: '10px 24px', borderRadius: 14, fontSize: 14, opacity: canAdvance ? 1 : 0.5, cursor: canAdvance ? 'pointer' : 'not-allowed' }}>
                Avançar →
              </button>
            ) : (
              <button onClick={handleCreate} disabled={creating || !step1Valid} className="btn-gradient" style={{ padding: '10px 24px', borderRadius: 14, fontSize: 14, opacity: (creating || !step1Valid) ? 0.5 : 1 }}>
                {creating ? 'Provisionando...' : 'Criar Organização'}
              </button>
            )}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── App Root ───
function App() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      if (data.session) {
        sb.from('users').select('role, name').eq('id', data.session.user.id).single().then(({ data: profile }) => {
          if (profile?.role === 'super_admin') setSession({ ...data, profile });
          else sb.auth.signOut();
          setLoading(false);
        });
      } else {
        setLoading(false);
      }
    });
  }, []);

  if (loading) return <div className="loader"></div>;
  if (!session) return <LoginPage onLogin={setSession} />;
  return <Dashboard session={session} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
